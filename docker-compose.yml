services:
  twquant-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twquant-app
    ports:
      - "8501:8501"
    volumes:
      - twquant-data:/app/data
    environment:
      - FINMIND_API_TOKEN=${FINMIND_API_TOKEN:-}
      - ARCTICDB_URI=lmdb:///app/data/arcticdb
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - TZ=Asia/Taipei
      # 容器行為旗標（皆可選填，留空則用 Dockerfile 預設）
      - AUTO_SEED=${AUTO_SEED:-true}     # 首次啟動自動 seed_data.py --universe（需 FINMIND_API_TOKEN）
      - ENABLE_CRON=${ENABLE_CRON:-true} # 啟動 cron daemon，每交易日 14:30 自動同步+掃描+推播
    restart: unless-stopped

volumes:
  twquant-data:
    name: twquant-data
