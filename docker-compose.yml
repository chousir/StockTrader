services:
  twquant-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twquant-app
    ports:
      - "8501:8501"
    volumes:
      - twquant-data:/app/data
    environment:
      - FINMIND_API_TOKEN=${FINMIND_API_TOKEN:-}
      - ARCTICDB_URI=lmdb:///app/data/arcticdb
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - TZ=Asia/Taipei
      # 容器行為旗標（lazy 啟動：不再自動 seed，改由 dashboard onboarding 互動式抓取）
      - ENABLE_CRON=${ENABLE_CRON:-true} # 啟動 cron daemon，每交易日 14:30 自動同步+掃描+推播
    restart: unless-stopped

volumes:
  twquant-data:
    name: twquant-data
